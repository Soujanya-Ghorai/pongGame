<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Overdrive Pong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="scoreboard">
            <div id="player-score" class="score cyan-glow">00</div>
            <div class="divider"></div>
            <div id="pc-score" class="score pink-glow">00</div>
        </div>

        <canvas id="pongCanvas"></canvas>

        <div id="overlay" class="overlay">
            <h1 class="title-glow">NEON PONG</h1>
            <p>Use <span class="highlight">Arrow Keys</span> or <span class="highlight">W/S</span> to Move</p>
            <button id="startBtn">START MISSION</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
